<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KaraOK — ร้องเพลงออนไลน์</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --surface: #ffffff;
      --surface2: #faf7f2;
      --accent: #e8472a;
      --accent2: #f7a600;
      --text: #1a1208;
      --muted: #8a7d6b;
      --border: #e2d9cc;
      --shadow: rgba(26,18,8,0.10);
    }

    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── BACKGROUND TEXTURE ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 15% 20%, rgba(232,71,42,0.07) 0%, transparent 50%),
        radial-gradient(circle at 85% 80%, rgba(247,166,0,0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── HEADER ─── */
    header {
      position: relative;
      z-index: 10;
      padding: 28px 40px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1.5px solid var(--border);
      background: rgba(245,240,232,0.85);
      backdrop-filter: blur(10px);
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .logo-main {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: -1px;
    }

    .logo-sub {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -1px;
    }

    .logo-tag {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-left: 8px;
      align-self: center;
    }

    .mic-icon {
      font-size: 1.5rem;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    /* ─── MAIN LAYOUT ─── */
    .app {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 0;
      height: calc(100vh - 77px);
    }

    /* ─── LEFT PANEL ─── */
    .left-panel {
      border-right: 1.5px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .search-area {
      padding: 24px 20px 16px;
      border-bottom: 1.5px solid var(--border);
    }

    .search-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      display: block;
    }

    .search-box {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .search-input {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      font-family: 'Sarabun', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      background: var(--surface2);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,71,42,0.12);
    }

    .search-input::placeholder { color: var(--muted); }

    .btn-search {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-search:hover { background: #c73820; transform: scale(1.05); }
    .btn-search:active { transform: scale(0.97); }

    /* Quick tags */
    .quick-tags {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.78rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Sarabun', sans-serif;
    }

    .tag:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* Results list */
    .results-header {
      padding: 16px 20px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .results-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .results-count {
      font-size: 0.75rem;
      color: var(--accent);
      font-weight: 600;
    }

    .results-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 12px;
    }

    .results-list::-webkit-scrollbar { width: 4px; }
    .results-list::-webkit-scrollbar-track { background: transparent; }
    .results-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .song-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 10px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-bottom: 4px;
      border: 1.5px solid transparent;
    }

    .song-card:hover {
      background: var(--surface2);
      border-color: var(--border);
    }

    .song-card.active {
      background: rgba(232,71,42,0.07);
      border-color: rgba(232,71,42,0.3);
    }

    .song-thumb {
      width: 60px;
      height: 42px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--border);
      flex-shrink: 0;
    }

    .song-thumb-placeholder {
      width: 60px;
      height: 42px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--border), var(--surface2));
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: var(--muted);
    }

    .song-info { flex: 1; min-width: 0; }

    .song-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    .song-channel {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .play-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      border: none;
      font-size: 0.7rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s, transform 0.15s;
    }

    .song-card:hover .play-btn { opacity: 1; }
    .song-card.active .play-btn { opacity: 1; background: var(--accent2); }
    .play-btn:hover { transform: scale(1.1); }

    /* ─── RIGHT PANEL ─── */
    .right-panel {
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }

    /* Player */
    .player-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .player-top {
      padding: 20px 28px 12px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .now-playing-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .now-playing-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      max-width: 500px;
      line-height: 1.3;
    }

    .now-playing-channel {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 3px;
    }

    /* Video frame */
    .video-wrapper {
      flex: 1;
      margin: 0 28px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 40px var(--shadow);
      background: #000;
      position: relative;
      min-height: 0;
    }

    .video-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 16px;
      padding: 40px;
      text-align: center;
    }

    .empty-icon {
      font-size: 4rem;
      opacity: 0.4;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .empty-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
      opacity: 0.4;
    }

    .empty-sub {
      font-size: 0.9rem;
      opacity: 0.6;
      max-width: 300px;
      line-height: 1.6;
    }

    /* Bottom bar */
    .bottom-bar {
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-top: 1.5px solid var(--border);
      background: var(--surface);
    }

    .volume-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .badge {
      background: rgba(232,71,42,0.1);
      color: var(--accent);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .spacer { flex: 1; }

    .yt-link {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--muted);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      transition: all 0.15s;
    }

    .yt-link:hover { background: var(--surface2); color: var(--accent); }

    /* Loading */
    .loading-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* No result */
    .no-result {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.7;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .app { grid-template-columns: 1fr; grid-template-rows: 50vh 1fr; }
      .left-panel { border-right: none; border-bottom: 1.5px solid var(--border); }
      header { padding: 16px 20px; }
      .player-top { padding: 14px 16px 8px; }
      .video-wrapper { margin: 0 16px; }
      .bottom-bar { padding: 10px 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-main">Kara</span><span class="logo-sub">OK</span>
    <span class="logo-tag">ร้องเพลงออนไลน์</span>
  </div>
  <span class="mic-icon">🎤</span>
</header>

<div class="app">
  <!-- LEFT: Search + List -->
  <div class="left-panel">
    <div class="search-area">
      <span class="search-label">ค้นหาเพลง</span>
      <div class="search-box">
        <input
          class="search-input"
          id="searchInput"
          type="text"
          placeholder="ชื่อเพลง / ศิลปิน..."
          autocomplete="off"
        />
        <button class="btn-search" id="searchBtn" title="ค้นหา">🔍</button>
      </div>
      <div class="quick-tags" id="quickTags">
        <span class="tag">คาราโอเกะไทย</span>
        <span class="tag">ลูกทุ่ง</span>
        <span class="tag">สตริง</span>
        <span class="tag">หมอลำ</span>
        <span class="tag">เพลงรัก</span>
        <span class="tag">ป๊อป</span>
      </div>
    </div>

    <div class="results-header">
      <span class="results-title">รายการเพลง</span>
      <span class="results-count" id="resultsCount"></span>
    </div>

    <div class="results-list" id="resultsList">
      <div class="no-result">
        🎵 พิมพ์ชื่อเพลงหรือศิลปิน<br>แล้วกดค้นหาได้เลยครับ
      </div>
    </div>
  </div>

  <!-- RIGHT: Player -->
  <div class="right-panel">
    <div class="player-area" id="playerArea">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🎙️</div>
        <div class="empty-title">เลือกเพลงเพื่อเริ่มร้อง</div>
        <div class="empty-sub">ค้นหาเพลงที่ต้องการด้านซ้าย แล้วกดเพื่อเปิดคาราโอเกะได้เลยครับ</div>
      </div>
    </div>

    <div class="bottom-bar">
      <span class="badge">🎵 YouTube Karaoke</span>
      <div class="spacer"></div>
      <span style="font-size:0.78rem;color:var(--muted);">เสียงจาก YouTube โดยตรง</span>
      <a class="yt-link" id="ytLink" href="#" target="_blank" style="display:none">
        ▶ เปิดใน YouTube
      </a>
    </div>
  </div>
</div>

<script>
  const searchInput = document.getElementById('searchInput');
  const searchBtn = document.getElementById('searchBtn');
  const resultsList = document.getElementById('resultsList');
  const resultsCount = document.getElementById('resultsCount');
  const playerArea = document.getElementById('playerArea');
  const emptyState = document.getElementById('emptyState');
  const ytLink = document.getElementById('ytLink');
  const quickTags = document.getElementById('quickTags');

  let currentVideoId = null;
  let currentCard = null;

  // Quick tag click
  quickTags.querySelectorAll('.tag').forEach(tag => {
    tag.addEventListener('click', () => {
      searchInput.value = tag.textContent + ' คาราโอเกะ';
      doSearch();
    });
  });

  searchBtn.addEventListener('click', doSearch);
  searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  async function doSearch() {
    const q = searchInput.value.trim();
    if (!q) return;

    // Auto-append คาราโอเกะ if not present
    const query = q.toLowerCase().includes('คาราโอเกะ') || q.toLowerCase().includes('karaoke')
      ? q : q + ' คาราโอเกะ';

    resultsList.innerHTML = `<div class="loading-state"><div class="spinner"></div>กำลังค้นหา...</div>`;
    resultsCount.textContent = '';

    try {
      // Use YouTube oEmbed-compatible search via invidious public API (no key needed)
      const encoded = encodeURIComponent(query);
      const resp = await fetch(`https://inv.tux.pizza/api/v1/search?q=${encoded}&type=video&fields=videoId,title,author,videoThumbnails`);

      if (!resp.ok) throw new Error('API error');
      const data = await resp.json();

      if (!data || data.length === 0) {
        resultsList.innerHTML = `<div class="no-result">ไม่พบผลลัพธ์<br>ลองค้นหาด้วยคำอื่นครับ</div>`;
        return;
      }

      renderResults(data.slice(0, 20));
    } catch (err) {
      // Fallback: use YouTube search redirect with manual input
      resultsList.innerHTML = `
        <div class="no-result">
          ⚠️ ไม่สามารถเชื่อมต่อ API ได้<br><br>
          ลองใส่ Video ID จาก YouTube ตรงๆ ครับ<br>
          <input id="vidInput" placeholder="วาง YouTube URL หรือ Video ID" style="margin-top:12px;width:90%;padding:8px 12px;border:1.5px solid #e2d9cc;border-radius:8px;font-family:Sarabun,sans-serif;font-size:0.88rem;outline:none" />
          <br>
          <button onclick="playFromInput()" style="margin-top:8px;background:#e8472a;color:white;border:none;border-radius:8px;padding:8px 18px;cursor:pointer;font-family:Sarabun,sans-serif;font-size:0.88rem">▶ เปิดเลย</button>
        </div>`;
    }
  }

  function renderResults(videos) {
    resultsCount.textContent = `${videos.length} รายการ`;
    resultsList.innerHTML = '';

    videos.forEach(video => {
      const thumb = video.videoThumbnails?.find(t => t.quality === 'medium') || video.videoThumbnails?.[0];
      const card = document.createElement('div');
      card.className = 'song-card';
      card.innerHTML = `
        ${thumb
          ? `<img class="song-thumb" src="${thumb.url}" alt="" loading="lazy" onerror="this.style.display='none'">`
          : `<div class="song-thumb-placeholder">🎵</div>`
        }
        <div class="song-info">
          <div class="song-title">${escHtml(video.title)}</div>
          <div class="song-channel">${escHtml(video.author)}</div>
        </div>
        <button class="play-btn" title="เล่น">▶</button>
      `;
      card.addEventListener('click', () => playVideo(video.videoId, video.title, video.author, card));
      resultsList.appendChild(card);
    });
  }

  function playVideo(videoId, title, channel, card) {
    if (currentCard) currentCard.classList.remove('active');
    card.classList.add('active');
    currentCard = card;
    currentVideoId = videoId;

    // Build player
    playerArea.innerHTML = `
      <div class="player-top">
        <div>
          <div class="now-playing-label">🎤 กำลังเล่น</div>
          <div class="now-playing-title">${escHtml(title)}</div>
          <div class="now-playing-channel">${escHtml(channel)}</div>
        </div>
      </div>
      <div class="video-wrapper">
        <iframe
          src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen
        ></iframe>
      </div>
    `;

    ytLink.href = `https://www.youtube.com/watch?v=${videoId}`;
    ytLink.style.display = 'flex';
  }

  function playFromInput() {
    const val = document.getElementById('vidInput')?.value?.trim();
    if (!val) return;
    let vid = val;
    const match = val.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    if (match) vid = match[1];
    if (vid.length === 11) {
      // create a fake card
      const fakeCard = document.createElement('div');
      playVideo(vid, 'เพลงที่เลือก', 'YouTube', fakeCard);
    }
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>

</body>
</html>
