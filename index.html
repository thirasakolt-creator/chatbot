<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>VOL CTRL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c;
    --panel: #111116;
    --border: #2a2a35;
    --accent: #e8ff47;
    --accent2: #ff4f4f;
    --text: #d4d4e0;
    --dim: #55556a;
    --glow: rgba(232,255,71,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 40px;
    overflow-x: hidden;
  }

  /* ─── HEADER ─────────────────────────────── */
  .header {
    width: 100%;
    padding: 18px 20px 14px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  .header-title {
    font-size: 11px;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 4px;
    color: var(--dim);
    text-transform: uppercase;
  }
  .header-sub {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 3px;
    line-height: 1;
    color: var(--text);
    text-transform: uppercase;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--dim);
    margin-bottom: 4px;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status-dot.online {
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
  }
  .status-dot.error {
    background: var(--accent2);
    box-shadow: 0 0 10px var(--accent2);
  }

  /* ─── IP SETUP ────────────────────────────── */
  .setup-bar {
    width: 100%;
    max-width: 420px;
    padding: 14px 20px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .ip-input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    letter-spacing: 1px;
  }
  .ip-input:focus { border-color: var(--accent); }
  .connect-btn {
    background: var(--accent);
    color: #000;
    border: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 14px;
    letter-spacing: 2px;
    padding: 10px 18px;
    cursor: pointer;
    text-transform: uppercase;
    transition: opacity 0.15s;
  }
  .connect-btn:active { opacity: 0.7; }

  /* ─── VOLUME DISPLAY ─────────────────────── */
  .vol-display {
    width: 100%;
    max-width: 420px;
    padding: 28px 20px 20px;
    text-align: center;
    position: relative;
  }

  .vol-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--dim);
    margin-bottom: 8px;
  }

  .vol-number {
    font-size: 108px;
    font-weight: 900;
    line-height: 0.9;
    letter-spacing: -4px;
    color: var(--accent);
    text-shadow: 0 0 60px var(--glow);
    transition: color 0.3s;
    font-variant-numeric: tabular-nums;
  }
  .vol-number.muted { color: var(--accent2); text-shadow: 0 0 40px rgba(255,79,79,0.2); }
  .vol-pct {
    font-size: 28px;
    font-weight: 300;
    color: var(--dim);
    vertical-align: super;
    letter-spacing: 0;
  }

  /* ─── SEGMENT BAR ────────────────────────── */
  .seg-bar {
    display: flex;
    gap: 3px;
    padding: 0 20px;
    max-width: 420px;
    width: 100%;
    margin: 0 auto 8px;
  }
  .seg {
    flex: 1;
    height: 5px;
    background: var(--border);
    transition: background 0.15s;
  }
  .seg.active { background: var(--accent); }
  .seg.active.high { background: var(--accent2); }

  .vol-status {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--dim);
    text-align: center;
    margin-bottom: 20px;
    min-height: 18px;
    transition: color 0.3s;
  }
  .vol-status.muted { color: var(--accent2); }

  /* ─── DIVIDER ─────────────────────────────── */
  .divider {
    width: calc(100% - 40px);
    max-width: 380px;
    height: 1px;
    background: var(--border);
    margin: 0 auto 24px;
  }

  /* ─── MAIN BUTTONS ────────────────────────── */
  .controls {
    width: 100%;
    max-width: 420px;
    padding: 0 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }

  .btn-vol {
    position: relative;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 18px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 28px 10px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.1s, border-color 0.1s, transform 0.1s;
    user-select: none;
    -webkit-user-select: none;
  }
  .btn-vol:active {
    background: #1a1a20;
    transform: scale(0.97);
    border-color: var(--accent);
  }
  .btn-vol .icon {
    font-size: 34px;
    line-height: 1;
  }
  .btn-vol.up .icon { color: var(--accent); }
  .btn-vol.down .icon { color: var(--dim); }
  .btn-vol .step-label {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
    font-weight: 300;
  }
  .btn-vol.up:active .icon { text-shadow: 0 0 20px var(--accent); }

  /* ─── PRESET BUTTONS ──────────────────────── */
  .presets-label {
    width: 100%;
    max-width: 420px;
    padding: 0 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--dim);
    margin: 14px 0 8px;
  }

  .presets {
    width: 100%;
    max-width: 420px;
    padding: 0 20px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }
  .btn-preset {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 1px;
    padding: 16px 6px;
    cursor: pointer;
    transition: all 0.12s;
    user-select: none;
    -webkit-user-select: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .btn-preset .pct { font-size: 11px; letter-spacing: 0; color: var(--dim); font-weight: 300; }
  .btn-preset:active {
    background: #16161e;
    border-color: var(--accent);
    color: var(--accent);
    transform: scale(0.96);
  }

  /* ─── MUTE BUTTON ─────────────────────────── */
  .mute-wrap {
    width: 100%;
    max-width: 420px;
    padding: 0 20px;
    margin-bottom: 14px;
  }
  .btn-mute {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 18px;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: all 0.12s;
    user-select: none;
    -webkit-user-select: none;
  }
  .btn-mute .mute-icon { font-size: 22px; }
  .btn-mute.is-muted {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(255,79,79,0.06);
  }
  .btn-mute:active { transform: scale(0.98); opacity: 0.8; }

  /* ─── FINE CONTROL ────────────────────────── */
  .fine-label {
    width: 100%;
    max-width: 420px;
    padding: 0 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--dim);
    margin: 6px 0 8px;
  }
  .fine-row {
    width: 100%;
    max-width: 420px;
    padding: 0 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 6px;
  }
  .btn-fine {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 13px 8px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.1s;
    user-select: none;
    -webkit-user-select: none;
  }
  .btn-fine:active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,255,71,0.04);
  }

  /* ─── TOAST ───────────────────────────────── */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--panel);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    padding: 10px 22px;
    pointer-events: none;
    transition: transform 0.3s cubic-bezier(.16,1,.3,1);
    z-index: 99;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.err { border-color: var(--accent2); color: var(--accent2); }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">AUDIO SYSTEM</div>
    <div class="header-sub">VOL CTRL</div>
  </div>
  <div class="status-dot" id="statusDot"></div>
</div>

<!-- IP Setup -->
<div class="setup-bar">
  <input class="ip-input" id="ipInput" type="text"
    placeholder="192.168.x.x:7788"
    autocomplete="off" autocorrect="off" spellcheck="false">
  <button class="connect-btn" onclick="connect()">CONN</button>
</div>

<!-- Volume Display -->
<div class="vol-display">
  <div class="vol-label">MASTER VOLUME</div>
  <div class="vol-number" id="volNum">--<span class="vol-pct">%</span></div>
</div>

<!-- Segment bar -->
<div class="seg-bar" id="segBar">
  <!-- filled by JS -->
</div>
<div class="vol-status" id="volStatus">DISCONNECTED</div>

<div class="divider"></div>

<!-- Main +/- -->
<div class="controls">
  <button class="btn-vol up" onclick="volUp(10)">
    <span class="icon">＋</span>
    <span>VOLUME UP</span>
    <span class="step-label">+10</span>
  </button>
  <button class="btn-vol down" onclick="volDown(10)">
    <span class="icon">－</span>
    <span>VOLUME DOWN</span>
    <span class="step-label">-10</span>
  </button>
</div>

<!-- Presets -->
<div class="presets-label">PRESET</div>
<div class="presets">
  <button class="btn-preset" onclick="setVol(25)">25<span class="pct">%</span></button>
  <button class="btn-preset" onclick="setVol(50)">50<span class="pct">%</span></button>
  <button class="btn-preset" onclick="setVol(75)">75<span class="pct">%</span></button>
  <button class="btn-preset" onclick="setVol(100)">100<span class="pct">%</span></button>
</div>

<!-- Mute -->
<div class="mute-wrap">
  <button class="btn-mute" id="muteBtn" onclick="toggleMute()">
    <span class="mute-icon" id="muteIcon">🔊</span>
    <span id="muteLabel">MUTE</span>
  </button>
</div>

<!-- Fine control -->
<div class="fine-label">FINE ADJUST</div>
<div class="fine-row">
  <button class="btn-fine" onclick="volUp(1)">▲ +1</button>
  <button class="btn-fine" onclick="volDown(1)">▼ -1</button>
</div>
<div class="fine-row">
  <button class="btn-fine" onclick="volUp(5)">▲ +5</button>
  <button class="btn-fine" onclick="volDown(5)">▼ -5</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────
let serverURL = "";
let curVol = 0;
let isMuted = false;
let pollTimer = null;

// ── Init segments ───────────────────────────────
const segBar = document.getElementById("segBar");
const SEG_COUNT = 20;
for (let i = 0; i < SEG_COUNT; i++) {
  const s = document.createElement("div");
  s.className = "seg";
  s.id = "seg" + i;
  segBar.appendChild(s);
}

// ── Helpers ─────────────────────────────────────
function getBase() {
  let v = document.getElementById("ipInput").value.trim();
  if (!v) return null;
  if (!v.startsWith("http")) v = "http://" + v;
  return v.replace(/\/$/, "");
}

async function apiFetch(path) {
  const base = getBase();
  if (!base) { showToast("กรอก IP ก่อน", true); return null; }
  try {
    const res = await fetch(base + path, { signal: AbortSignal.timeout(3000) });
    if (!res.ok) throw new Error("HTTP " + res.status);
    return await res.json();
  } catch (e) {
    setOffline();
    showToast("ไม่สามารถเชื่อมต่อ", true);
    return null;
  }
}

function updateUI(data) {
  if (!data) return;
  curVol = data.volume;
  isMuted = data.muted;

  const numEl = document.getElementById("volNum");
  numEl.innerHTML = curVol + '<span class="vol-pct">%</span>';
  numEl.className = "vol-number" + (isMuted ? " muted" : "");

  // segments
  const active = Math.round((curVol / 100) * SEG_COUNT);
  for (let i = 0; i < SEG_COUNT; i++) {
    const el = document.getElementById("seg" + i);
    el.className = "seg" + (i < active ? (" active" + (i >= 14 ? " high" : "")) : "");
  }

  // mute
  const muteBtn = document.getElementById("muteBtn");
  const muteIcon = document.getElementById("muteIcon");
  const muteLabel = document.getElementById("muteLabel");
  if (isMuted) {
    muteBtn.classList.add("is-muted");
    muteIcon.textContent = "🔇";
    muteLabel.textContent = "UNMUTE";
  } else {
    muteBtn.classList.remove("is-muted");
    muteIcon.textContent = "🔊";
    muteLabel.textContent = "MUTE";
  }

  const statusEl = document.getElementById("volStatus");
  statusEl.textContent = isMuted ? "MUTED" : "LIVE";
  statusEl.className = "vol-status" + (isMuted ? " muted" : "");

  setOnline();
}

function setOnline() {
  document.getElementById("statusDot").className = "status-dot online";
}
function setOffline() {
  document.getElementById("statusDot").className = "status-dot error";
  document.getElementById("volStatus").textContent = "OFFLINE";
}

let toastTimer;
function showToast(msg, isErr = false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show" + (isErr ? " err" : "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = "toast"; }, 1800);
}

// ── Connect ──────────────────────────────────────
async function connect() {
  const base = getBase();
  if (!base) { showToast("กรอก IP:PORT ก่อน", true); return; }
  // save to localStorage
  localStorage.setItem("vol_server", document.getElementById("ipInput").value.trim());
  const data = await apiFetch("/status");
  if (data) {
    updateUI(data);
    showToast("เชื่อมต่อแล้ว");
    startPolling();
  }
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    const data = await apiFetch("/status");
    if (data) updateUI(data);
  }, 2000);
}

// ── Volume actions ───────────────────────────────
async function volUp(step) {
  const data = await apiFetch(`/up?step=${step}`);
  if (data) { updateUI(data); showToast(`+${step}`); }
}
async function volDown(step) {
  const data = await apiFetch(`/down?step=${step}`);
  if (data) { updateUI(data); showToast(`-${step}`); }
}
async function setVol(v) {
  const data = await apiFetch(`/set?v=${v}`);
  if (data) { updateUI(data); showToast(`SET ${v}%`); }
}
async function toggleMute() {
  const data = await apiFetch("/toggle_mute");
  if (data) { updateUI(data); showToast(data.muted ? "MUTED" : "UNMUTED"); }
}

// ── On load ──────────────────────────────────────
window.addEventListener("load", () => {
  const saved = localStorage.getItem("vol_server");
  if (saved) {
    document.getElementById("ipInput").value = saved;
    connect();
  }
});
</script>
</body>
</html>
