<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KaraOK</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f5f0e8;--surface:#fff;--surface2:#faf7f2;
      --accent:#e8472a;--accent2:#f7a600;--green:#22a267;
      --text:#1a1208;--muted:#8a7d6b;--border:#e2d9cc;
      --shadow:rgba(26,18,8,0.12);
    }
    html,body{height:100%;overflow:hidden}
    body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}

    /* ── HEADER ── */
    header{
      flex-shrink:0;padding:10px 20px;
      display:flex;align-items:center;gap:12px;
      border-bottom:1.5px solid var(--border);
      background:rgba(245,240,232,0.95);backdrop-filter:blur(10px);
      z-index:20;
    }
    .logo-main{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;color:var(--accent)}
    .logo-sub {font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--text)}
    .logo-tag {font-size:0.62rem;font-weight:600;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-left:4px}
    .mic{font-size:1.2rem;animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
    .hdr-spacer{flex:1}
    .api-status{font-size:0.7rem;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px}
    .api-status.ok{color:var(--green);border-color:rgba(34,162,103,0.3);background:rgba(34,162,103,0.07)}
    .api-status.warn{color:var(--accent2);border-color:rgba(247,166,0,0.3);background:rgba(247,166,0,0.07)}
    .api-status.err{color:var(--accent);border-color:rgba(232,71,42,0.3);background:rgba(232,71,42,0.07)}

    /* ── MAIN LAYOUT: video big left, panel right ── */
    .main{flex:1;display:grid;grid-template-columns:1fr 340px;min-height:0}

    /* ── VIDEO SIDE ── */
    .video-side{display:flex;flex-direction:column;background:#111;position:relative;min-height:0}
    .video-wrapper{flex:1;position:relative;min-height:0}
    .video-wrapper iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
    .no-video{
      position:absolute;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:12px;
      color:rgba(255,255,255,0.3);text-align:center;
    }
    .no-video-icon{font-size:4rem;animation:float 3s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    .no-video-title{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700}
    .no-video-sub{font-size:0.85rem;opacity:.7;max-width:260px;line-height:1.6}

    /* Now playing bar */
    .now-bar{
      flex-shrink:0;padding:8px 16px;
      display:flex;align-items:center;gap:12px;
      background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);
      border-top:1px solid rgba(255,255,255,0.08);
    }
    .now-info{flex:1;min-width:0}
    .now-label{font-size:0.6rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--accent)}
    .now-title{font-size:0.9rem;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .now-channel{font-size:0.72rem;color:rgba(255,255,255,0.45)}
    .btn-yt{
      display:flex;align-items:center;gap:5px;font-size:0.72rem;color:rgba(255,255,255,0.5);
      text-decoration:none;padding:5px 10px;border-radius:8px;
      border:1px solid rgba(255,255,255,0.12);transition:all 0.15s;white-space:nowrap;
    }
    .btn-yt:hover{color:#fff;border-color:rgba(255,255,255,0.3)}

    /* ── RIGHT PANEL ── */
    .right-panel{
      border-left:1.5px solid var(--border);background:var(--surface);
      display:flex;flex-direction:column;overflow:hidden;
    }

    /* Tabs */
    .tabs{display:flex;border-bottom:1.5px solid var(--border);flex-shrink:0}
    .tab{
      flex:1;padding:10px 8px;font-size:0.78rem;font-weight:600;
      color:var(--muted);cursor:pointer;border:none;background:none;
      border-bottom:2.5px solid transparent;transition:all 0.15s;
      font-family:'Sarabun',sans-serif;
    }
    .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
    .tab-badge{
      display:inline-block;background:var(--accent);color:#fff;
      border-radius:20px;font-size:0.62rem;padding:1px 6px;margin-left:4px;
    }

    /* Tab content */
    .tab-content{flex:1;display:none;flex-direction:column;overflow:hidden;min-height:0}
    .tab-content.active{display:flex}

    /* ── SEARCH TAB ── */
    .search-area{padding:12px 12px 8px;border-bottom:1.5px solid var(--border);flex-shrink:0}
    .search-box{display:flex;gap:6px;margin-bottom:7px}
    .search-input{
      flex:1;border:1.5px solid var(--border);border-radius:10px;
      padding:9px 12px;font-family:'Sarabun',sans-serif;font-size:0.88rem;
      color:var(--text);background:var(--surface2);outline:none;
      transition:border-color 0.2s,box-shadow 0.2s;
    }
    .search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,71,42,0.1)}
    .search-input::placeholder{color:var(--muted)}
    .btn-search{
      background:var(--accent);color:#fff;border:none;border-radius:10px;
      padding:9px 13px;font-size:0.95rem;cursor:pointer;transition:background 0.2s,transform 0.15s;
    }
    .btn-search:hover{background:#c73820;transform:scale(1.05)}
    .quick-tags{display:flex;flex-wrap:wrap;gap:4px}
    .tag{
      background:var(--surface2);border:1px solid var(--border);border-radius:20px;
      padding:2px 9px;font-size:0.72rem;color:var(--muted);cursor:pointer;
      transition:all 0.15s;font-family:'Sarabun',sans-serif;
    }
    .tag:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

    .results-hdr{padding:8px 12px 4px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .results-label{font-size:0.64rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
    .results-count{font-size:0.7rem;color:var(--accent);font-weight:600}

    .results-list{flex:1;overflow-y:auto;padding:0 8px 8px}
    .results-list::-webkit-scrollbar{width:3px}
    .results-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

    .song-card{
      display:flex;align-items:center;gap:8px;padding:7px 7px;
      border-radius:10px;cursor:pointer;transition:background 0.15s;
      margin-bottom:3px;border:1.5px solid transparent;
    }
    .song-card:hover{background:var(--surface2);border-color:var(--border)}
    .song-card.active{background:rgba(232,71,42,0.07);border-color:rgba(232,71,42,0.3)}
    .song-thumb{width:72px;height:42px;border-radius:6px;object-fit:cover;background:var(--border);flex-shrink:0}
    .song-thumb-ph{width:72px;height:42px;border-radius:6px;background:linear-gradient(135deg,var(--border),var(--surface2));flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1rem}
    .song-info{flex:1;min-width:0}
    .song-title{font-size:0.8rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .song-ch{font-size:0.68rem;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-actions{display:flex;gap:4px;flex-shrink:0;opacity:0;transition:opacity 0.15s}
    .song-card:hover .card-actions{opacity:1}
    .btn-play-now,.btn-add-q{
      width:26px;height:26px;border-radius:50%;border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;font-size:0.6rem;
      transition:transform 0.15s;
    }
    .btn-play-now{background:var(--accent);color:#fff}
    .btn-add-q{background:var(--accent2);color:#fff}
    .btn-play-now:hover,.btn-add-q:hover{transform:scale(1.12)}

    .loading-state{padding:28px 14px;text-align:center;color:var(--muted);font-size:0.84rem}
    .spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 8px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .no-result{padding:24px 12px;text-align:center;color:var(--muted);font-size:0.82rem;line-height:1.7}

    /* ── QUEUE TAB ── */
    .queue-list{flex:1;overflow-y:auto;padding:8px}
    .queue-list::-webkit-scrollbar{width:3px}
    .queue-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

    .queue-empty{padding:32px 16px;text-align:center;color:var(--muted);font-size:0.82rem;line-height:1.7}

    .q-item{
      display:flex;align-items:center;gap:8px;padding:7px 7px;
      border-radius:10px;margin-bottom:3px;border:1.5px solid var(--border);
      background:var(--surface2);
    }
    .q-item.playing{border-color:rgba(232,71,42,0.4);background:rgba(232,71,42,0.06)}
    .q-num{
      width:22px;height:22px;border-radius:50%;background:var(--border);
      font-size:0.68rem;font-weight:700;color:var(--muted);
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
    }
    .q-item.playing .q-num{background:var(--accent);color:#fff}
    .q-thumb{width:56px;height:34px;border-radius:5px;object-fit:cover;background:var(--border);flex-shrink:0}
    .q-thumb-ph{width:56px;height:34px;border-radius:5px;background:linear-gradient(135deg,var(--border),var(--surface2));flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.9rem}
    .q-info{flex:1;min-width:0}
    .q-title{font-size:0.78rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .q-ch{font-size:0.66rem;color:var(--muted);margin-top:1px}
    .q-actions{display:flex;gap:3px;flex-shrink:0}
    .btn-q-play,.btn-q-del{
      width:24px;height:24px;border-radius:50%;border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;font-size:0.6rem;
    }
    .btn-q-play{background:var(--green);color:#fff}
    .btn-q-del{background:#f0e8e0;color:var(--muted)}
    .btn-q-play:hover{background:#1a8a55}
    .btn-q-del:hover{background:var(--accent);color:#fff}

    .queue-footer{padding:10px 10px;border-top:1.5px solid var(--border);display:flex;gap:6px;flex-shrink:0}
    .btn-clear-q{
      flex:1;padding:7px;border:1px solid var(--border);border-radius:8px;
      background:var(--surface2);color:var(--muted);font-family:'Sarabun',sans-serif;
      font-size:0.76rem;cursor:pointer;transition:all 0.15s;
    }
    .btn-clear-q:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
    .btn-next-q{
      flex:1;padding:7px;border:none;border-radius:8px;
      background:var(--accent);color:#fff;font-family:'Sarabun',sans-serif;
      font-size:0.76rem;cursor:pointer;transition:background 0.15s;
    }
    .btn-next-q:hover{background:#c73820}

    /* Toast */
    .toast{
      position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);
      background:var(--text);color:#fff;padding:8px 18px;border-radius:20px;
      font-size:0.8rem;font-family:'Sarabun',sans-serif;
      transition:transform 0.3s ease;z-index:999;pointer-events:none;white-space:nowrap;
    }
    .toast.show{transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>

<header>
  <span class="mic">🎤</span>
  <span class="logo-main">Kara</span><span class="logo-sub">OK</span>
  <span class="logo-tag">ร้องเพลงออนไลน์</span>
  <div class="hdr-spacer"></div>
  <span class="api-status" id="apiStatus">🔑 API พร้อม</span>
</header>

<div class="main">
  <!-- VIDEO SIDE -->
  <div class="video-side">
    <div class="video-wrapper" id="videoWrapper">
      <div class="no-video" id="noVideo">
        <div class="no-video-icon">🎙️</div>
        <div class="no-video-title">KaraOK</div>
        <div class="no-video-sub">ค้นหาเพลงด้านขวา แล้วกดเล่นได้เลยครับ</div>
      </div>
    </div>
    <div class="now-bar" id="nowBar" style="display:none">
      <div class="now-info">
        <div class="now-label">🎤 กำลังเล่น</div>
        <div class="now-title" id="nowTitle">—</div>
        <div class="now-channel" id="nowChannel"></div>
      </div>
      <a class="btn-yt" id="btnYt" href="#" target="_blank">▶ YouTube</a>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="tabs">
      <button class="tab active" data-tab="search">🔍 ค้นหา</button>
      <button class="tab" data-tab="queue">📋 คิว <span class="tab-badge" id="qBadge" style="display:none">0</span></button>
    </div>

    <!-- SEARCH TAB -->
    <div class="tab-content active" id="tab-search">
      <div class="search-area">
        <div class="search-box">
          <input class="search-input" id="searchInput" type="text" placeholder="ชื่อเพลง / ศิลปิน..." autocomplete="off"/>
          <button class="btn-search" id="searchBtn">🔍</button>
        </div>
        <div class="quick-tags" id="quickTags">
          <span class="tag">ลูกทุ่ง</span>
          <span class="tag">สตริง</span>
          <span class="tag">หมอลำ</span>
          <span class="tag">เพลงรัก</span>
          <span class="tag">ป๊อปไทย</span>
          <span class="tag">อีสาน</span>
          <span class="tag">เพื่อชีวิต</span>
        </div>
      </div>
      <div class="results-hdr">
        <span class="results-label">ผลการค้นหา</span>
        <span class="results-count" id="resultsCount"></span>
      </div>
      <div class="results-list" id="resultsList">
        <div class="no-result">🎵 พิมพ์ชื่อเพลงหรือศิลปิน<br>แล้วกดค้นหาได้เลยครับ</div>
      </div>
    </div>

    <!-- QUEUE TAB -->
    <div class="tab-content" id="tab-queue">
      <div class="queue-list" id="queueList">
        <div class="queue-empty">📋 ยังไม่มีเพลงในคิว<br><br>กดปุ่ม 🟡 ที่ผลค้นหา<br>เพื่อเพิ่มเพลงเข้าคิวครับ</div>
      </div>
      <div class="queue-footer">
        <button class="btn-clear-q" id="btnClearQ">🗑 ล้างคิว</button>
        <button class="btn-next-q" id="btnNextQ">▶ เล่นถัดไป</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── API KEYS (ใส่สำรองได้สูงสุด 4 อัน) ───
const API_KEYS = [
  'AIzaSyB08FbTdFyD6m7TL4SvlJF6cxed7KrD6P8',
  // 'ใส่ API KEY สำรอง 2 ตรงนี้',
  // 'ใส่ API KEY สำรอง 3 ตรงนี้',
  // 'ใส่ API KEY สำรอง 4 ตรงนี้',
];
let currentKeyIdx = 0;

function getKey() { return API_KEYS[currentKeyIdx]; }

function nextKey() {
  if (currentKeyIdx < API_KEYS.length - 1) {
    currentKeyIdx++;
    updateApiStatus(`🔑 สลับ API #${currentKeyIdx + 1}`, 'warn');
    return true;
  }
  updateApiStatus('❌ API เต็มทุกตัว', 'err');
  return false;
}

function updateApiStatus(msg, type = 'ok') {
  const el = document.getElementById('apiStatus');
  el.textContent = msg;
  el.className = 'api-status ' + type;
}

// ─── TABS ───
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

// ─── SEARCH ───
const searchInput  = document.getElementById('searchInput');
const searchBtn    = document.getElementById('searchBtn');
const resultsList  = document.getElementById('resultsList');
const resultsCount = document.getElementById('resultsCount');

document.getElementById('quickTags').querySelectorAll('.tag').forEach(tag => {
  tag.addEventListener('click', () => { searchInput.value = tag.textContent; doSearch(); });
});
searchBtn.addEventListener('click', doSearch);
searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

async function doSearch(retried = false) {
  const q = searchInput.value.trim();
  if (!q) return;
  // Always append คาราโอเกะ
  const query = q + ' คาราโอเกะ';
  resultsList.innerHTML = `<div class="loading-state"><div class="spinner"></div>กำลังค้นหา...</div>`;
  resultsCount.textContent = '';
  try {
    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&type=video&maxResults=20&key=${getKey()}`;
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.error) {
      const code = data.error.code;
      if ((code === 403 || code === 429) && !retried) {
        // quota exceeded — try next key
        if (nextKey()) { doSearch(true); return; }
      }
      resultsList.innerHTML = `<div class="no-result">❌ ${esc(data.error.message)}</div>`;
      return;
    }
    updateApiStatus(`🔑 API #${currentKeyIdx + 1} ใช้งานได้`, 'ok');
    if (!data.items || data.items.length === 0) {
      resultsList.innerHTML = `<div class="no-result">ไม่พบผลลัพธ์<br>ลองค้นหาด้วยคำอื่นครับ</div>`;
      return;
    }
    renderResults(data.items);
  } catch(err) {
    resultsList.innerHTML = `<div class="no-result">⚠️ เชื่อมต่อไม่ได้<br>กรุณาตรวจสอบอินเทอร์เน็ตครับ</div>`;
  }
}

let activeSearchCard = null;

function renderResults(items) {
  resultsCount.textContent = `${items.length} รายการ`;
  resultsList.innerHTML = '';
  items.forEach(item => {
    const vid     = item.id.videoId;
    const title   = item.snippet.title;
    const channel = item.snippet.channelTitle;
    const thumb   = item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url || '';
    const card    = document.createElement('div');
    card.className = 'song-card';
    card.innerHTML = `
      ${thumb ? `<img class="song-thumb" src="${esc(thumb)}" alt="" loading="lazy">` : `<div class="song-thumb-ph">🎵</div>`}
      <div class="song-info">
        <div class="song-title">${esc(title)}</div>
        <div class="song-ch">${esc(channel)}</div>
      </div>
      <div class="card-actions">
        <button class="btn-play-now" title="เล่นเลย">▶</button>
        <button class="btn-add-q"   title="เพิ่มในคิว">+</button>
      </div>
    `;
    card.querySelector('.btn-play-now').addEventListener('click', e => {
      e.stopPropagation();
      if (activeSearchCard) activeSearchCard.classList.remove('active');
      card.classList.add('active');
      activeSearchCard = card;
      playVideo({vid, title, channel, thumb});
    });
    card.querySelector('.btn-add-q').addEventListener('click', e => {
      e.stopPropagation();
      addToQueue({vid, title, channel, thumb});
    });
    card.addEventListener('click', () => {
      if (activeSearchCard) activeSearchCard.classList.remove('active');
      card.classList.add('active');
      activeSearchCard = card;
      playVideo({vid, title, channel, thumb});
    });
    resultsList.appendChild(card);
  });
}

// ─── PLAYER ───
let currentVideo = null;

function playVideo({vid, title, channel, thumb}) {
  currentVideo = {vid, title, channel, thumb};
  const wrapper = document.getElementById('videoWrapper');
  const noVideo = document.getElementById('noVideo');
  if (noVideo) noVideo.remove();

  // Remove old iframe
  const old = wrapper.querySelector('iframe');
  if (old) old.remove();

  const iframe = document.createElement('iframe');
  iframe.src = `https://www.youtube.com/embed/${vid}?autoplay=1&rel=0&modestbranding=1`;
  iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
  iframe.allowFullscreen = true;
  wrapper.appendChild(iframe);

  document.getElementById('nowTitle').textContent   = title;
  document.getElementById('nowChannel').textContent = channel;
  document.getElementById('btnYt').href = `https://www.youtube.com/watch?v=${vid}`;
  document.getElementById('nowBar').style.display = 'flex';

  // Mark queue item
  document.querySelectorAll('.q-item').forEach(el => el.classList.remove('playing'));
  document.querySelectorAll('.q-item').forEach(el => {
    if (el.dataset.vid === vid) el.classList.add('playing');
  });
}

// ─── QUEUE ───
let queue = [];

function addToQueue(song) {
  queue.push(song);
  renderQueue();
  showToast(`➕ เพิ่ม "${song.title.substring(0, 20)}..." ในคิวแล้ว`);
}

function renderQueue() {
  const list  = document.getElementById('queueList');
  const badge = document.getElementById('qBadge');
  badge.textContent = queue.length;
  badge.style.display = queue.length > 0 ? 'inline-block' : 'none';

  if (queue.length === 0) {
    list.innerHTML = `<div class="queue-empty">📋 ยังไม่มีเพลงในคิว<br><br>กดปุ่ม 🟡 ที่ผลค้นหา<br>เพื่อเพิ่มเพลงเข้าคิวครับ</div>`;
    return;
  }

  list.innerHTML = '';
  queue.forEach((song, idx) => {
    const isPlaying = currentVideo?.vid === song.vid;
    const item = document.createElement('div');
    item.className = 'q-item' + (isPlaying ? ' playing' : '');
    item.dataset.vid = song.vid;
    item.innerHTML = `
      <div class="q-num">${idx + 1}</div>
      ${song.thumb ? `<img class="q-thumb" src="${esc(song.thumb)}" alt="" loading="lazy">` : `<div class="q-thumb-ph">🎵</div>`}
      <div class="q-info">
        <div class="q-title">${esc(song.title)}</div>
        <div class="q-ch">${esc(song.channel)}</div>
      </div>
      <div class="q-actions">
        <button class="btn-q-play" title="เล่นเพลงนี้">▶</button>
        <button class="btn-q-del"  title="ลบออกจากคิว">✕</button>
      </div>
    `;
    item.querySelector('.btn-q-play').addEventListener('click', () => {
      playVideo(song);
      renderQueue();
    });
    item.querySelector('.btn-q-del').addEventListener('click', () => {
      queue.splice(idx, 1);
      renderQueue();
    });
    list.appendChild(item);
  });
}

document.getElementById('btnClearQ').addEventListener('click', () => {
  if (queue.length === 0) return;
  queue = [];
  renderQueue();
  showToast('🗑 ล้างคิวแล้ว');
});

document.getElementById('btnNextQ').addEventListener('click', () => {
  if (queue.length === 0) { showToast('📋 ไม่มีเพลงในคิว'); return; }
  const next = queue.shift();
  playVideo(next);
  renderQueue();
  // Switch to search tab for visibility
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector('[data-tab="queue"]').classList.add('active');
  document.getElementById('tab-queue').classList.add('active');
});

// ─── TOAST ───
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
